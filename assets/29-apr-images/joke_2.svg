<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#121212"/>
  <rect x="20" y="20" width="360" height="360" rx="20" fill="#1E1E1E" stroke="#00E676" stroke-width="2"/>
  <text x="200" y="100" font-family="Arial" font-size="20" fill="#FFFFFF" text-anchor="middle">What do you call a</text>
  <text x="200" y="130" font-family="Arial" font-size="20" fill="#FFFFFF" text-anchor="middle">runner who finished last?</text>
  <text x="200" y="230" font-family="Arial" font-size="40" fill="#00E676" text-anchor="middle" font-weight="bold">A RUNNER.</text>
  <text x="200" y="300" font-family="Arial" font-size="18" fill="#6C757D" text-anchor="middle">(You still beat everyone on the couch!)</text>
  <text x="200" y="350" font-family="Arial" font-size="40" text-anchor="middle">👟🔥</text>
</svg>