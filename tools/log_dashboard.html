<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MajuRun — Live Log Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    header {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo { font-size: 20px; font-weight: 800; color: #00e676; letter-spacing: 1px; }
    .subtitle { font-size: 12px; color: #666; }

    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.connected { background: #00e676; box-shadow: 0 0 6px #00e676; animation: pulse 2s infinite; }
    .status-dot.error     { background: #ff5252; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .status-text { font-size: 12px; color: #888; }

    .counter {
      margin-left: auto;
      font-size: 12px;
      color: #555;
    }
    .counter span { color: #00e676; font-weight: bold; }

    /* ── TOOLBAR ── */
    .toolbar {
      background: #111;
      border-bottom: 1px solid #1a1a1a;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .toolbar label { font-size: 12px; color: #666; }

    select, input[type=text] {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      outline: none;
    }
    select:focus, input[type=text]:focus { border-color: #00e676; }

    .btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: #252525; border-color: #444; }
    .btn.danger:hover { background: #2a1010; border-color: #ff5252; color: #ff5252; }
    .btn.active { background: #00e676; color: #000; border-color: #00e676; font-weight: bold; }

    .sep { width: 1px; height: 20px; background: #222; }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 16px;
      padding: 6px 16px;
      background: #0d0d0d;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
    .stat { font-size: 11px; }
    .stat-label { color: #555; }
    .stat-val   { font-weight: bold; }
    .stat-val.warn  { color: #ff9800; }
    .stat-val.error { color: #ff5252; }
    .stat-val.info  { color: #64b5f6; }
    .stat-val.ok    { color: #00e676; }

    /* ── LOG LIST ── */
    #log-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      scroll-behavior: smooth;
    }

    .log-entry {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 7px 10px;
      border-radius: 7px;
      margin-bottom: 3px;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: background 0.1s;
      font-size: 12px;
    }
    .log-entry:hover { background: #181818; }

    .log-entry.WARNING { border-color: #ff9800; background: rgba(255,152,0,0.04); }
    .log-entry.ERROR   { border-color: #ff5252; background: rgba(255,82,82,0.06); }
    .log-entry.INFO    { border-color: #64b5f6; background: rgba(100,181,246,0.03); }
    .log-entry.DEBUG   { border-color: #444; }
    .log-entry.VERBOSE { border-color: #333; opacity: 0.7; }

    .log-badge {
      font-size: 10px;
      font-weight: 800;
      padding: 2px 5px;
      border-radius: 4px;
      flex-shrink: 0;
      letter-spacing: 0.5px;
      min-width: 36px;
      text-align: center;
    }
    .badge-WARNING { background: #ff9800; color: #000; }
    .badge-ERROR   { background: #ff5252; color: #fff; }
    .badge-INFO    { background: #64b5f6; color: #000; }
    .badge-DEBUG   { background: #444;    color: #fff; }
    .badge-VERBOSE { background: #333;    color: #aaa; }

    .log-time { color: #555; flex-shrink: 0; font-family: monospace; font-size: 11px; padding-top: 1px; }

    .log-tag {
      color: #00e676;
      font-weight: bold;
      flex-shrink: 0;
      font-size: 11px;
      padding-top: 1px;
      min-width: 80px;
    }

    .log-body { flex: 1; min-width: 0; }
    .log-msg  { color: #ccc; word-break: break-word; line-height: 1.4; }
    .log-err  { color: #ff7070; font-size: 11px; margin-top: 2px; word-break: break-word; }

    .log-meta { display: flex; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
    .meta-chip {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      background: #1a1a1a;
      color: #666;
      border: 1px solid #252525;
    }
    .meta-chip.android { border-color: #3ddc84; color: #3ddc84; }
    .meta-chip.ios     { border-color: #64b5f6; color: #64b5f6; }
    .meta-chip.release { border-color: #ff9800; color: #ff9800; }

    /* ── DETAIL PANEL ── */
    #detail-panel {
      position: fixed;
      top: 0; right: -420px;
      width: 420px;
      height: 100vh;
      background: #111;
      border-left: 1px solid #222;
      padding: 16px;
      overflow-y: auto;
      transition: right 0.25s ease;
      z-index: 100;
    }
    #detail-panel.open { right: 0; }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .detail-title { font-weight: bold; color: #00e676; }
    .close-btn { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; }
    .close-btn:hover { color: #fff; }

    .detail-field { margin-bottom: 12px; }
    .detail-field label { font-size: 10px; color: #555; display: block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 1px; }
    .detail-field pre {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      border-radius: 6px;
      padding: 8px;
      font-size: 11px;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      color: #ccc;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 200px;
      overflow-y: auto;
    }

    .copy-btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #888;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      margin-top: 8px;
    }
    .copy-btn:hover { color: #00e676; border-color: #00e676; }

    /* ── EMPTY STATE ── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: #444;
      gap: 8px;
    }
    #empty-state .icon { font-size: 40px; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0d0d; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }

    /* ── AUTH MODAL ── */
    #auth-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }
    .auth-box {
      background: #111;
      border: 1px solid #222;
      border-radius: 14px;
      padding: 32px;
      width: 360px;
      text-align: center;
    }
    .auth-box h2 { color: #00e676; margin-bottom: 8px; }
    .auth-box p  { color: #666; font-size: 13px; margin-bottom: 24px; }
    .auth-box input {
      width: 100%; margin-bottom: 10px; padding: 10px 14px;
      font-size: 14px; border-radius: 8px;
    }
    .auth-box button {
      width: 100%; padding: 12px;
      background: #00e676; color: #000;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: bold; cursor: pointer;
    }
    .auth-box button:hover { background: #00c853; }
    .auth-error { color: #ff5252; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>

<!-- AUTH MODAL -->
<div id="auth-modal">
  <div class="auth-box">
    <div style="font-size:36px;margin-bottom:12px">⚡</div>
    <h2>MajuRun Logs</h2>
    <p>Sign in with your admin account to view live logs</p>
    <input type="email"    id="auth-email"    placeholder="Email"    value="majurun.app@gmail.com" />
    <input type="password" id="auth-password" placeholder="Password" />
    <button onclick="signIn()">Sign In</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div>
    <div class="logo">⚡ MajuRun</div>
    <div class="subtitle">Live Log Dashboard</div>
  </div>
  <div class="status-dot" id="status-dot"></div>
  <div class="status-text" id="status-text">Connecting…</div>
  <div class="counter">Showing <span id="log-count">0</span> logs</div>
  <button class="btn" onclick="toggleAutoScroll()" id="autoscroll-btn" title="Toggle auto-scroll">↓ Auto-scroll</button>
  <button class="btn danger" onclick="clearDisplay()" title="Clear display (does not delete from Firestore)">🗑 Clear</button>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <label>Level</label>
  <select id="filter-level" onchange="applyFilters()">
    <option value="ALL">All levels</option>
    <option value="WARNING">Warning+</option>
    <option value="ERROR" selected>Error only</option>
    <option value="DEBUG">Debug+</option>
  </select>

  <div class="sep"></div>

  <label>Platform</label>
  <select id="filter-platform" onchange="applyFilters()">
    <option value="ALL">All</option>
    <option value="android">Android</option>
    <option value="iOS">iOS</option>
  </select>

  <div class="sep"></div>

  <label>Search</label>
  <input type="text" id="filter-search" placeholder="tag, message, userId…" oninput="applyFilters()" style="width:200px" />

  <div class="sep"></div>

  <button class="btn" onclick="exportLogs()">⬇ Export JSON</button>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat"><span class="stat-label">ERRORS </span><span class="stat-val error" id="cnt-error">0</span></div>
  <div class="stat"><span class="stat-label">WARNINGS </span><span class="stat-val warn" id="cnt-warning">0</span></div>
  <div class="stat"><span class="stat-label">INFO </span><span class="stat-val info" id="cnt-info">0</span></div>
  <div class="stat"><span class="stat-label">ANDROID </span><span class="stat-val ok" id="cnt-android">0</span></div>
  <div class="stat"><span class="stat-label">iOS </span><span class="stat-val ok" id="cnt-ios">0</span></div>
  <div class="stat" style="margin-left:auto"><span class="stat-label">LAST UPDATE </span><span class="stat-val" id="last-update">—</span></div>
</div>

<!-- LOG LIST -->
<div id="log-container">
  <div id="empty-state">
    <div class="icon">📋</div>
    <div>Waiting for logs…</div>
    <div style="font-size:11px">Open the app on a real device to see live logs here</div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div id="detail-panel">
  <div class="detail-header">
    <div class="detail-title">Log Detail</div>
    <button class="close-btn" onclick="closeDetail()">✕</button>
  </div>
  <div id="detail-content"></div>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, collection, query, orderBy, limit, onSnapshot, where, Timestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyDWkbogBZ5sLctxyibzT7Hcsnv3B2XY9_E",
    authDomain:        "majurun-8d8b5.firebaseapp.com",
    projectId:         "majurun-8d8b5",
    storageBucket:     "majurun-8d8b5.firebasestorage.app",
    messagingSenderId: "648836412000",
    appId:             "1:648836412000:web:bd63d35e5459bd4eac8905",
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // Expose to window for button handlers
  window._auth = auth;
  window._db   = db;
  window._firebase = { collection, query, orderBy, limit, onSnapshot, where, Timestamp, signInWithEmailAndPassword };

  window.signIn = async () => {
    const email = document.getElementById('auth-email').value;
    const pass  = document.getElementById('auth-password').value;
    const errEl = document.getElementById('auth-error');
    errEl.textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) {
      errEl.textContent = e.message;
    }
  };

  onAuthStateChanged(auth, user => {
    if (user) {
      document.getElementById('auth-modal').style.display = 'none';
      window.startListening();
    }
  });
</script>

<script>
  // ── STATE ──
  let allLogs      = [];
  let filteredLogs = [];
  let autoScroll   = true;
  let unsubscribe  = null;

  const LEVEL_ORDER = { VERBOSE: 0, DEBUG: 1, INFO: 2, WARNING: 3, ERROR: 4 };
  const LEVEL_MIN   = { ALL: 0, DEBUG: 1, INFO: 2, WARNING: 3, ERROR: 4 };

  // ── START LISTENING ──
  window.startListening = function() {
    const { collection, query, orderBy, limit, onSnapshot } = window._firebase;
    const db = window._db;

    setStatus('connected', 'Live');

    const q = query(
      collection(db, 'app_logs'),
      orderBy('timestamp', 'desc'),
      limit(500)
    );

    unsubscribe = onSnapshot(q,
      snap => {
        allLogs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        // Reverse so newest is at bottom
        allLogs.reverse();
        applyFilters();
        updateStats();
        document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
      },
      err => {
        setStatus('error', 'Error: ' + err.message);
        console.error(err);
      }
    );
  };

  // ── FILTERS ──
  window.applyFilters = function() {
    const levelFilter    = document.getElementById('filter-level').value;
    const platformFilter = document.getElementById('filter-platform').value;
    const search         = document.getElementById('filter-search').value.toLowerCase();
    const minLevel       = LEVEL_MIN[levelFilter] ?? 0;

    filteredLogs = allLogs.filter(log => {
      const logLevel = LEVEL_ORDER[log.level] ?? 0;
      if (logLevel < minLevel) return false;
      if (platformFilter !== 'ALL' && log.platform !== platformFilter) return false;
      if (search) {
        const haystack = [log.tag, log.message, log.error, log.userId, log.level]
          .filter(Boolean).join(' ').toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    });

    renderLogs();
  };

  // ── RENDER ──
  function renderLogs() {
    const container = document.getElementById('log-container');
    const empty     = document.getElementById('empty-state');
    const countEl   = document.getElementById('log-count');

    countEl.textContent = filteredLogs.length;

    if (filteredLogs.length === 0) {
      container.innerHTML = '';
      container.appendChild(empty);
      empty.style.display = 'flex';
      return;
    }

    empty.style.display = 'none';

    // Re-render all (simple approach — fine for 500 logs)
    const fragment = document.createDocumentFragment();
    filteredLogs.forEach(log => {
      fragment.appendChild(buildLogEl(log));
    });

    container.innerHTML = '';
    container.appendChild(fragment);

    if (autoScroll) {
      container.scrollTop = container.scrollHeight;
    }
  }

  function buildLogEl(log) {
    const el       = document.createElement('div');
    const level    = log.level || 'DEBUG';
    const ts       = log.timestamp?.toDate?.() ?? new Date();
    const platform = (log.platform || '').toLowerCase();

    el.className = `log-entry ${level}`;
    el.onclick   = () => showDetail(log);

    const timeStr = `${pad(ts.getHours())}:${pad(ts.getMinutes())}:${pad(ts.getSeconds())}`;
    const dateStr = `${pad(ts.getMonth()+1)}/${pad(ts.getDate())}`;

    const platformChip = platform
      ? `<span class="meta-chip ${platform}">${platform}</span>` : '';
    const releaseChip  = log.isRelease
      ? `<span class="meta-chip release">RELEASE</span>` : '';
    const uidChip      = log.userId
      ? `<span class="meta-chip">uid:${log.userId.substring(0,8)}…</span>` : '';
    const errorHtml    = log.error
      ? `<div class="log-err">⚠ ${escHtml(log.error)}</div>` : '';

    el.innerHTML = `
      <span class="log-badge badge-${level}">${level.substring(0,4)}</span>
      <span class="log-time">${dateStr} ${timeStr}</span>
      <span class="log-tag">[${escHtml(log.tag || 'App')}]</span>
      <div class="log-body">
        <div class="log-msg">${escHtml(log.message || '')}</div>
        ${errorHtml}
        <div class="log-meta">${platformChip}${releaseChip}${uidChip}</div>
      </div>
    `;

    return el;
  }

  // ── STATS ──
  function updateStats() {
    const counts = { ERROR: 0, WARNING: 0, INFO: 0, android: 0, iOS: 0 };
    allLogs.forEach(l => {
      if (l.level === 'ERROR')   counts.ERROR++;
      if (l.level === 'WARNING') counts.WARNING++;
      if (l.level === 'INFO')    counts.INFO++;
      if (l.platform === 'android') counts.android++;
      if (l.platform === 'iOS')     counts.iOS++;
    });
    document.getElementById('cnt-error').textContent   = counts.ERROR;
    document.getElementById('cnt-warning').textContent = counts.WARNING;
    document.getElementById('cnt-info').textContent    = counts.INFO;
    document.getElementById('cnt-android').textContent = counts.android;
    document.getElementById('cnt-ios').textContent     = counts.iOS;
  }

  // ── DETAIL PANEL ──
  window.showDetail = function(log) {
    const panel   = document.getElementById('detail-panel');
    const content = document.getElementById('detail-content');
    const ts      = log.timestamp?.toDate?.() ?? new Date();

    content.innerHTML = `
      ${field('Level',    `<pre>${log.level || '—'}</pre>`)}
      ${field('Tag',      `<pre>${escHtml(log.tag || '—')}</pre>`)}
      ${field('Time',     `<pre>${ts.toLocaleString()}</pre>`)}
      ${field('Platform', `<pre>${log.platform || '—'} | Release: ${log.isRelease}</pre>`)}
      ${field('User ID',  `<pre>${log.userId || 'anonymous'}</pre>`)}
      ${field('Message',  `<pre>${escHtml(log.message || '—')}</pre>`)}
      ${log.error ? field('Error', `<pre>${escHtml(log.error)}</pre>`) : ''}
      ${log.stack ? field('Stack Trace', `<pre style="max-height:300px">${escHtml(log.stack)}</pre>`) : ''}
      <button class="copy-btn" onclick="copyLog(${JSON.stringify(JSON.stringify(log))})">📋 Copy full log</button>
    `;

    panel.classList.add('open');
  };

  window.closeDetail = function() {
    document.getElementById('detail-panel').classList.remove('open');
  };

  window.copyLog = function(jsonStr) {
    navigator.clipboard.writeText(JSON.parse(jsonStr));
    alert('Copied to clipboard!');
  };

  function field(label, html) {
    return `<div class="detail-field"><label>${label}</label>${html}</div>`;
  }

  // ── CONTROLS ──
  window.toggleAutoScroll = function() {
    autoScroll = !autoScroll;
    const btn = document.getElementById('autoscroll-btn');
    btn.textContent = autoScroll ? '↓ Auto-scroll' : '⏸ Paused';
    btn.classList.toggle('active', autoScroll);
  };

  window.clearDisplay = function() {
    allLogs = [];
    filteredLogs = [];
    renderLogs();
    updateStats();
  };

  window.exportLogs = function() {
    const data = JSON.stringify(filteredLogs, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `majurun_logs_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // ── HELPERS ──
  function setStatus(type, text) {
    const dot  = document.getElementById('status-dot');
    const txt  = document.getElementById('status-text');
    dot.className  = `status-dot ${type}`;
    txt.textContent = text;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  // Close detail on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetail();
  });
</script>
</body>
</html>
