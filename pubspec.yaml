name: majurun
description: A modular running app.
publish_to: 'none'
version: 1.0.0+133

environment:
  sdk: ">=3.3.0 <4.0.0"   # raised minimum — most packages now require it

dependencies:
  flutter:
    sdk: flutter

  # Firebase ────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  # firebase_app_check: 0.3.2+10  # Disabled - causes AppCheckCore version conflicts
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  google_fonts: ^6.2.1

  # State & utilities ───────────────────────────────────────
  provider: ^6.1.2
  equatable: ^2.0.7
  intl: ^0.19.0
  font_awesome_flutter: ^10.7.0

  # Auth / Social login ─────────────────────────────────────
  google_sign_in: ^6.3.0
  # flutter_facebook_auth: ^7.1.1
  twitter_login: ^4.4.2

  # Networking & storage ────────────────────────────────────
  dio: ^5.7.0
  http: ^1.2.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.2
  path: ^1.9.0
  crypto: ^3.0.5

  # Media & UI ──────────────────────────────────────────────
  cached_network_image: ^3.4.0
  image_picker: ^1.1.2
  video_player: ^2.9.1
  chewie: ^1.8.1
  screenshot: ^3.0.0
  fl_chart: ^1.1.1
  table_calendar: ^3.1.2

  # Maps & Location ─────────────────────────────────────────
  geolocator: ^13.0.1
  google_maps_flutter: ^2.9.0
  latlong2: ^0.9.1

  # Health & sensors ────────────────────────────────────────
  health: ^13.2.1
  sensors_plus: ^6.1.1
  permission_handler: ^11.3.1

  # Sharing & utils ─────────────────────────────────────────
  share_plus: ^12.0.0
  url_launcher: ^6.3.0
  timeago: ^3.7.0
  uuid: ^4.5.0
  flutter_tts: ^4.2.2
  web: ^1.1.1
  cloud_functions: ^5.1.3
  connectivity_plus: ^6.0.5

  # In-app purchases ──────────────────────────────────────────
  in_app_purchase: ^3.2.0

  # Offline storage ───────────────────────────────────────────
  sqflite: ^2.3.3
  sqflite_common_ffi_web: ^0.4.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Performance & Look ────────────────────────────────────────
  shimmer: ^3.0.0

  # WebView for workout videos ─────────────────────────────────
  webview_flutter: ^4.8.0
  webview_flutter_web: ^0.2.3

  # Push Notifications ────────────────────────────────────────
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  flutter_timezone: ^3.0.0          # get device local timezone name for correct notification scheduling

  # Background Location - DISABLED (requires paid license for release builds)
  # flutter_background_geolocation: ^5.0.0
  # Using geolocator with foreground service instead (free)

  # App version info (reads actual build number from pubspec at runtime)
  package_info_plus: ^8.0.0

  # Performance & Monitoring ──────────────────────────────────
  firebase_performance: ^0.10.0
  firebase_remote_config: ^5.0.0
  sentry_flutter: ^9.0.0

  # Deep Linking (share runs, challenges) ─────────────────────
  app_links: ^6.0.0
  firebase_app_check: ^0.3.2+10
  audio_session: ^0.1.21          # manages AVAudioSession lifecycle (duck + restore)
  wakelock_plus: ^1.2.10          # keeps screen on during warmup + active run

  # Remove or conditionalize ────────────────────────────────
  # js: ^0.6.7                  # ← REMOVE (only for web)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1   # ← added

# Configuration for flutter_launcher_icons
# Key must be flutter_launcher_icons (not flutter_icons — that's deprecated)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"   # Android adaptive icon background
  remove_alpha_ios: true                # iOS doesn't allow transparent icons
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/workouts/
    - lib/workouts/

# Optional: helps with dependency resolution in some cases
# dependency_overrides:
  # No overrides needed for macos-15 with Xcode 16
