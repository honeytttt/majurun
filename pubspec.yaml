name: majurun
description: A modular running app.
publish_to: 'none'
version: 1.0.0+11

environment:
  sdk: ">=3.3.0 <4.0.0"   # raised minimum — most packages now require it

dependencies:
  flutter:
    sdk: flutter

  # Firebase ────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  # firebase_app_check: 0.3.2+10  # Disabled - causes AppCheckCore version conflicts
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  google_fonts: ^6.2.1

  # State & utilities ───────────────────────────────────────
  provider: ^6.1.2
  equatable: ^2.0.7
  intl: ^0.19.0
  font_awesome_flutter: ^10.7.0

  # Auth / Social login ─────────────────────────────────────
  # Pin to 6.1.x to use GoogleSignIn 7.x SDK (compatible with Firebase 10.x AppCheckCore)
  google_sign_in: 6.1.6
  # flutter_facebook_auth: ^7.1.1
  twitter_login: ^4.4.2

  # Networking & storage ────────────────────────────────────
  dio: ^5.7.0
  http: ^1.2.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.2
  path: ^1.9.0
  crypto: ^3.0.5

  # Media & UI ──────────────────────────────────────────────
  cached_network_image: ^3.4.0
  image_picker: ^1.1.2
  video_player: ^2.9.1
  chewie: ^1.8.1
  screenshot: ^3.0.0
  fl_chart: ^1.1.1
  table_calendar: ^3.1.2

  # Maps & Location ─────────────────────────────────────────
  geolocator: ^13.0.1
  google_maps_flutter: ^2.9.0
  latlong2: ^0.9.1

  # Health & sensors ────────────────────────────────────────
  health: ^13.2.1
  sensors_plus: ^6.1.1
  permission_handler: ^11.3.1

  # Sharing & utils ─────────────────────────────────────────
  share_plus: ^12.0.0
  url_launcher: ^6.3.0
  timeago: ^3.7.0
  uuid: ^4.5.0
  flutter_tts: ^4.2.2
  web: ^1.1.1
  cloud_functions: ^5.1.3
  connectivity_plus: ^6.0.5

  # In-app purchases ──────────────────────────────────────────
  in_app_purchase: ^3.2.0

  # Offline storage ───────────────────────────────────────────
  sqflite: ^2.3.3
  sqflite_common_ffi_web: ^0.4.3

  # WebView for workout videos ─────────────────────────────────
  webview_flutter: ^4.8.0
  webview_flutter_web: ^0.2.3

  # Push Notifications ────────────────────────────────────────
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # Background Location - DISABLED (requires paid license for release builds)
  # flutter_background_geolocation: ^5.0.0
  # Using geolocator with foreground service instead (free)

  # Performance & Monitoring ──────────────────────────────────
  firebase_performance: ^0.10.0
  firebase_remote_config: ^5.0.0
  sentry_flutter: ^9.0.0

  # Deep Linking (share runs, challenges) ─────────────────────
  app_links: ^6.0.0

  # Remove or conditionalize ────────────────────────────────
  # js: ^0.6.7                  # ← REMOVE (only for web)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1   # ← added

# Configuration for flutter_launcher_icons
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"  # ← ensure this file exists
  # Optional Android adaptive icon settings:
  # Use either a color hex (background) or an image file
  adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: true
  # If you have a separate foreground asset, set it here; otherwise remove
  # adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/workouts/
    - lib/workouts/

# Optional: helps with dependency resolution in some cases
dependency_overrides:
  # Pin in_app_purchase_storekit to avoid iOS 18/Xcode 16 API requirements
  # Version 0.3.17 doesn't use winBackOffers API that requires iOS 18 SDK
  in_app_purchase_storekit: 0.3.17
  # androidx.appcompat:appcompat: 1.7.0
  # androidx.core:core: 1.13.1
