name: majurun
description: A modular running app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0' # Fixed: Added proper range and version

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.32.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.17.0
  provider: ^6.1.1
  equatable: ^2.0.5
  cached_network_image: ^3.3.0
  geolocator: ^12.0.0
  google_maps_flutter: ^2.10.0
  latlong2: ^0.9.1
  image_picker: ^1.0.7
  firebase_storage: ^11.6.0
  http: ^1.2.0
  cloudinary_public: ^0.23.1
  video_player: ^2.8.1
  chewie: ^1.7.1
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^6.1.0
  flutter_dotenv: ^5.1.0 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env # Ensure your .env file is in the root folder