name: majurun
description: A modular running app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  provider: ^6.1.1
  equatable: ^2.0.5
  cached_network_image: ^3.3.0
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^6.1.0
  twitter_login: ^4.4.2
  intl: 0.19.0
  dio: ^5.4.0
  image_picker: ^1.2.1
  uuid: ^4.3.3
  video_player: ^2.8.1
  chewie: ^1.7.1
  url_launcher: ^6.3.0
  timeago: ^3.7.1
  share_plus: ^12.0.1
  geolocator: ^13.0.1      # GPS location fetching
  google_maps_flutter: ^2.10.0 # To display the path
  latlong2: ^0.9.1         # Math for distance calculation
  sensors_plus: ^6.1.1     # Pedometer/Motion backup
  flutter_tts: ^4.2.2
  shared_preferences: ^2.2.2
  http: ^1.1.0
  screenshot: ^3.0.0
  path_provider: ^2.1.5
  fl_chart: ^1.1.1
  health: 13.2.1
  table_calendar: ^3.1.2
  permission_handler: ^11.3.1
  path: ^1.9.0
  crypto: ^3.0.3
  

  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true