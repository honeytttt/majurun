name: majurun
description: A modular running app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'   # raised minimum — most packages now require it

dependencies:
  flutter:
    sdk: flutter

  # Firebase ────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_app_check: 0.3.2+10

  # State & utilities ───────────────────────────────────────
  provider: ^6.1.2
  equatable: ^2.0.7
  intl: ^0.19.0

  # Auth / Social login ─────────────────────────────────────
  google_sign_in: ^6.3.0
  #flutter_facebook_auth: ^7.1.1     # ← updated (critical!)
  twitter_login: ^4.4.2             # still ok, but check if you still need it

  # Networking & storage ────────────────────────────────────
  dio: ^5.7.0
  http: ^1.2.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.2
  path: ^1.9.0
  crypto: ^3.0.5

  # Media & UI ──────────────────────────────────────────────
  cached_network_image: ^3.4.0
  image_picker: ^1.1.2
  video_player: ^2.9.1
  chewie: ^1.8.1
  screenshot: ^3.0.0
  fl_chart: ^1.1.1
  table_calendar: ^3.1.2

  # Maps & Location ─────────────────────────────────────────
  geolocator: ^13.0.1
  google_maps_flutter: ^2.9.0
  latlong2: ^0.9.1

  # Health & sensors ────────────────────────────────────────
  health: ^13.2.1
  sensors_plus: ^6.1.1
  permission_handler: ^11.3.1

  # Sharing & utils ─────────────────────────────────────────
  share_plus: ^10.0.3           # 12.0.1 was never released — use latest stable
  url_launcher: ^6.3.0
  timeago: ^3.7.0
  uuid: ^4.5.0
  flutter_tts: ^4.2.2
  web: ^1.1.1
  cloud_functions: ^5.1.3

  # Remove or conditionalize ────────────────────────────────
  # js: ^0.6.7                  # ← REMOVE (only for web)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0         # updated

flutter:
  uses-material-design: true

# Optional: helps with dependency resolution in some cases
dependency_overrides:
  # Only use if you still get AndroidX version conflicts after updating facebook
  # androidx.appcompat:appcompat: 1.7.0
  # androidx.core:core: 1.13.1