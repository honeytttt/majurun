name: Android Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'appbundle'
        type: choice
        options:
          - appbundle
          - apk
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - dev

jobs:
  build-android:
    name: Android ${{ github.event.inputs.build_type }} (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # ── Firebase config injection ──────────────────────────────────────────
      - name: Inject google-services.json (prod)
        if: ${{ github.event.inputs.environment == 'prod' }}
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_PROD }}" | base64 --decode > android/app/google-services.json

      - name: Inject google-services.json (dev)
        if: ${{ github.event.inputs.environment == 'dev' }}
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_DEV }}" | base64 --decode > android/app/google-services.json

      - name: Inject firebase_options (both always required by main.dart)
        run: |
          mkdir -p lib/env
          echo "${{ secrets.FIREBASE_OPTIONS_DEV }}" | base64 --decode > lib/env/firebase_options_dev.dart
          echo "${{ secrets.FIREBASE_OPTIONS_PROD }}" | base64 --decode > lib/env/firebase_options_prod.dart

      # ── Keystore setup ─────────────────────────────────────────────────────
      - name: Setup release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/majurun-release.jks
          cat > android/key.properties <<EOF
          storeFile=../majurun-release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build App Bundle
        if: ${{ github.event.inputs.build_type == 'appbundle' }}
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          flutter build appbundle --release \
            --dart-define=ENVIRONMENT=${{ github.event.inputs.environment == 'prod' && 'production' || 'development' }}

      - name: Build APK
        if: ${{ github.event.inputs.build_type == 'apk' }}
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=ENVIRONMENT=${{ github.event.inputs.environment == 'prod' && 'production' || 'development' }}

      # ── Upload artifacts ───────────────────────────────────────────────────
      - name: Upload AAB
        if: ${{ github.event.inputs.build_type == 'appbundle' }}
        uses: actions/upload-artifact@v4
        with:
          name: MajuRun-${{ github.event.inputs.environment }}-AAB-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

      - name: Upload APK
        if: ${{ github.event.inputs.build_type == 'apk' }}
        uses: actions/upload-artifact@v4
        with:
          name: MajuRun-${{ github.event.inputs.environment }}-APK-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      # ── Deploy to Play Store (prod AAB only) ───────────────────────────────
      - name: Upload to Play Store internal track
        if: ${{ github.event.inputs.build_type == 'appbundle' && github.event.inputs.environment == 'prod' }}
        uses: r0adkll/upload-google-play@v3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.majurun.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
