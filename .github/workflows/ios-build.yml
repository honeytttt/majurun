name: iOS Build

# Automatic trigger on push + Manual dispatch
on:
  push:
    branches:
      - main
      - 'feature/**'
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - profile

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  build-ios:
    needs: validate
    name: Build iOS IPA
    runs-on: macos-15
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BUILD_MODE: ${{ github.event.inputs.build_mode || 'release' }}

    steps:
      - name: Select Xcode version
        run: |
          echo "=== Available Xcode versions ==="
          ls /Applications | grep Xcode

          # Apple requires iOS 26 SDK (Xcode 26+) for all App Store uploads.
          # macos-15 already has Xcode_26.x installed alongside Xcode 16.x.
          # Pick the highest Xcode 26.x available.
          XCODE_26=$(ls /Applications | grep "^Xcode_26" | sort -V | tail -1)
          if [ -n "$XCODE_26" ]; then
            sudo xcode-select -s "/Applications/${XCODE_26}/Contents/Developer"
            echo "Selected: $XCODE_26"
          else
            echo "ERROR: Xcode 26 not found on this runner. Available versions:"
            ls /Applications | grep "^Xcode_"
            exit 1
          fi

          xcodebuild -version
          xcodebuild -showsdks | grep -E "iphoneos"

      - name: Download iOS Platform
        timeout-minutes: 10
        run: |
          # Check available Xcode platforms
          echo "=== Checking installed SDKs ==="
          xcodebuild -showsdks

          echo "=== Checking SDK paths ==="
          xcrun --sdk iphoneos --show-sdk-path 2>&1 || true
          xcrun --sdk iphoneos --show-sdk-version 2>&1 || true

          # Try downloading iOS platform with retries
          echo "=== Attempting iOS platform download ==="
          for i in 1 2 3; do
            echo "Attempt $i..."
            if xcodebuild -downloadPlatform iOS 2>&1; then
              echo "Download successful"
              break
            fi
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done

          # Verify platform is available by checking for iphoneos SDK
          if xcrun --sdk iphoneos --show-sdk-path >/dev/null 2>&1; then
            echo "iOS SDK is available at: $(xcrun --sdk iphoneos --show-sdk-path)"
          else
            echo "WARNING: iOS SDK may not be properly installed"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      # NOTE: flutter_launcher_icons is NOT run here. Running it in CI
      # overwrites project.pbxproj with a broken
      # ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS=AppIcon
      # value (should be YES), causing the wrong app icon on device.
      # Icons are already correctly committed in ios/Runner/Assets.xcassets/.

      # Inject firebase_options dart files (required by lib/main.dart)
      - name: Inject firebase_options (dev + prod)
        run: |
          mkdir -p lib/env
          echo "${{ secrets.FIREBASE_OPTIONS_DEV }}" | base64 --decode > lib/env/firebase_options_dev.dart
          echo "${{ secrets.FIREBASE_OPTIONS_PROD }}" | base64 --decode > lib/env/firebase_options_prod.dart
          echo "firebase_options injected"

      # Inject Firebase config (prod only for iOS releases)
      - name: Inject GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_PROD }}" | base64 --decode > ios/Runner/GoogleService-Info.plist
          echo "GoogleService-Info.plist injected"

      - name: Install Apple Certificate
        env:
          P12_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          # Create paths
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db

          # Decode certificate using printf (more reliable than echo)
          printf '%s' "$P12_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Debug: show file size and password length
          echo "Certificate file size:"
          ls -la $CERTIFICATE_PATH
          echo "Password length: ${#P12_PASSWORD}"

          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate - write password to temp file to avoid shell escaping
          PASS_FILE=$RUNNER_TEMP/pass.txt
          printf '%s' "$P12_PASSWORD" > $PASS_FILE

          security import $CERTIFICATE_PATH \
            -P "$(cat $PASS_FILE)" \
            -A \
            -t cert \
            -f pkcs12 \
            -k $KEYCHAIN_PATH \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          rm -f $PASS_FILE

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          echo "Certificate installed successfully"

      - name: Install Provisioning Profile
        env:
          PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          WATCH_PROFILE_BASE64: ${{ secrets.WATCH_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Install iOS (Runner) provisioning profile
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROFILE_BASE64" | base64 --decode > $PROFILE_PATH
          UUID=$(security cms -D -i $PROFILE_PATH | plutil -extract UUID raw -)
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "iOS provisioning profile installed: $UUID"

          # Install watchOS provisioning profile (if provided)
          if [ -n "$WATCH_PROFILE_BASE64" ]; then
            WATCH_PROFILE_PATH=$RUNNER_TEMP/watch_profile.mobileprovision
            echo -n "$WATCH_PROFILE_BASE64" | base64 --decode > $WATCH_PROFILE_PATH
            WATCH_UUID=$(security cms -D -i $WATCH_PROFILE_PATH | plutil -extract UUID raw -)
            cp $WATCH_PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$WATCH_UUID.mobileprovision
            echo "watchOS provisioning profile installed: $WATCH_UUID"
            echo "WATCH_PROFILE_PATH=$WATCH_PROFILE_PATH" >> $GITHUB_ENV
            echo "WATCH_PROFILE_UUID=$WATCH_UUID" >> $GITHUB_ENV
          else
            echo "No watch provisioning profile provided — watch app will be built but not properly signed for App Store"
          fi

      - name: Update iOS project settings
        run: |
          cd ios

          # Update bundle identifier if needed
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.majurun.app" Runner/Info.plist || true

          echo "iOS project settings updated"

      - name: Inject Google Maps API key
        env:
          IOS_MAPS_API_KEY: ${{ secrets.IOS_MAPS_API_KEY }}
        run: |
          sed -i '' "s/MAPS_API_KEY_PLACEHOLDER/${IOS_MAPS_API_KEY}/" ios/Runner/AppDelegate.swift
          echo "Google Maps iOS API key injected"

      # NOTE: watchOS target is wired directly into project.pbxproj.
      # Watch app (com.majurun.app.watchkitapp) is embedded in Runner via
      # "Embed Watch Content" build phase. For App Store submission, add:
      #   WATCH_PROVISION_PROFILE_BASE64 — base64-encoded watchOS distribution profile
      # Without this secret the watch app builds but won't pass App Store validation.

      - name: Build Flutter iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=ENVIRONMENT=production \
            --dart-define=CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }} \
            --dart-define=CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }} \
            --dart-define=CLOUDINARY_UPLOAD_PRESET=${{ secrets.CLOUDINARY_UPLOAD_PRESET }}

      - name: Build Watch App (watchOS SDK)
        run: |
          # Build watch target separately using the watchOS SDK.
          # The watch is NOT a dependency of Runner (would inherit iphoneos SDK from
          # -destination 'generic/platform=iOS' and fail). We build it standalone
          # here and inject it into the archive after Runner is archived.

          # Parse version from pubspec.yaml — xcodebuild doesn't run Flutter's build
          # system so $(FLUTTER_BUILD_NAME)/$(FLUTTER_BUILD_NUMBER) are never set
          # unless we pass them explicitly.
          BUILD_NAME=$(grep "^version:" pubspec.yaml | sed 's/version: //;s/+.*//')
          BUILD_NUMBER=$(grep "^version:" pubspec.yaml | sed 's/.*+//')
          echo "Watch build version: $BUILD_NAME ($BUILD_NUMBER)"

          # Generate watch icon PNG (alpha-stripped) before building.
          WATCH_ASSETS="ios/MajuRunWatch Watch App/Assets.xcassets/AppIcon.appiconset"
          sips -z 1024 1024 assets/icon/app_icon.png --out "$WATCH_ASSETS/icon-1024.png" 2>/dev/null || true
          # Strip alpha channel — App Store rejects transparent watch icons.
          sips -s format jpeg "$WATCH_ASSETS/icon-1024.png" --out /tmp/icon_flat.jpg 2>/dev/null || true
          sips -s format png /tmp/icon_flat.jpg --out "$WATCH_ASSETS/icon-1024.png" 2>/dev/null || true
          echo "Watch icon generated (alpha stripped):"
          ls -la "$WATCH_ASSETS/"

          # Xcode 26 actool requires a new "[2d]" appearance dimension that our
          # hand-crafted Contents.json doesn't satisfy. Let Xcode tell us the right
          # format by reading its own project template, then inject our icon filename.
          echo "=== Reading Xcode 26 watchOS icon template ==="
          XCODE_TEMPLATE=$(find /Applications/Xcode_26.3.app \
            -path "*/watchOS*/*.xctemplate/*/AppIcon.appiconset/Contents.json" 2>/dev/null | head -1)
          if [ -z "$XCODE_TEMPLATE" ]; then
            XCODE_TEMPLATE=$(find /Applications/Xcode_26.3.app \
              -path "*watchos*AppIcon*Contents.json" 2>/dev/null \
              ! -path "*simulator*" | head -1)
          fi
          if [ -n "$XCODE_TEMPLATE" ]; then
            echo "Found Xcode 26 template: $XCODE_TEMPLATE"
            cat "$XCODE_TEMPLATE"
            cp "$XCODE_TEMPLATE" "$WATCH_ASSETS/Contents.json"
            # Inject our icon filename into every image entry that lacks one
            python3 -c "
import json, sys
with open('$WATCH_ASSETS/Contents.json') as f:
    d = json.load(f)
for img in d.get('images', []):
    img.setdefault('filename', 'icon-1024.png')
with open('$WATCH_ASSETS/Contents.json', 'w') as f:
    json.dump(d, f, indent=2)
print('Template updated with icon filename')
"
            echo "=== Updated Contents.json ==="
            cat "$WATCH_ASSETS/Contents.json"
          else
            echo "WARNING: Xcode 26 template not found — using committed Contents.json"
            cat "$WATCH_ASSETS/Contents.json"
          fi

          WATCHOS_SDK=$(xcodebuild -showsdks | grep "^[[:space:]]*watchOS [0-9]" | grep -v -i simulator | awk '{print $NF}' | tail -1)
          echo "Using watchOS SDK: $WATCHOS_SDK"

          xcodebuild build \
            -project ios/Runner.xcodeproj \
            -target "MajuRunWatch Watch App" \
            -sdk "$WATCHOS_SDK" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            FLUTTER_BUILD_NAME="$BUILD_NAME" \
            FLUTTER_BUILD_NUMBER="$BUILD_NUMBER" \
            WATCHOS_DEPLOYMENT_TARGET=10.0 \
            CONFIGURATION_BUILD_DIR=$RUNNER_TEMP/watch_products \
            2>&1 | grep -E "CompileAssetCatalog|actool|error:|Assets\.car|CFBundle" | head -20 || true

          echo "=== Watch app bundle contents ==="
          WATCH_APP=$(find $RUNNER_TEMP/watch_products -name "*.app" -maxdepth 1 | head -1)
          ls -la "$WATCH_APP/" || true

          # xcodebuild sometimes silently skips asset catalog compilation in
          # standalone builds. Run actool explicitly to guarantee Assets.car exists.
          echo "=== Compiling asset catalog with actool ==="
          xcrun actool \
            --output-format human-readable-text \
            --notices \
            --warnings \
            --output-partial-info-plist "$RUNNER_TEMP/actool_partial.plist" \
            --app-icon AppIcon \
            --compress-pngs \
            --enable-on-demand-resources NO \
            --target-device watch \
            --minimum-deployment-target 10.0 \
            --platform watchos \
            --product-type com.apple.product-type.application \
            --compile "$WATCH_APP" \
            "ios/MajuRunWatch Watch App/Assets.xcassets" 2>&1 || true

          echo "=== After actool — bundle contents ==="
          ls -la "$WATCH_APP/" | grep -E "\.car|\.png|Info" || true

          # Check if actool produced a valid Assets.car
          if [ -f "$WATCH_APP/Assets.car" ]; then
            echo "Assets.car size: $(wc -c < "$WATCH_APP/Assets.car") bytes"
            xcrun assetutil --info "$WATCH_APP/Assets.car" 2>&1 | head -30 || true
          else
            echo "WARNING: Assets.car NOT produced by actool"
          fi

          # Copy the icon PNG directly into the bundle root.
          # CFBundleIconFiles = ["AppIcon"] looks for AppIcon.png in the bundle root.
          # This satisfies Apple's "Missing Icons" check even if Assets.car is absent.
          cp "$WATCH_ASSETS/icon-1024.png" "$WATCH_APP/AppIcon.png" 2>/dev/null || true
          echo "AppIcon.png in bundle: $(ls -la "$WATCH_APP/AppIcon.png" 2>/dev/null || echo MISSING)"

          # Ensure CFBundleIconName is in the processed Info.plist
          # (xcodebuild may strip keys it expects actool to provide)
          /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" \
            "$WATCH_APP/Info.plist" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" \
            "$WATCH_APP/Info.plist"
          echo "CFBundleIconName in Info.plist: $(plutil -extract CFBundleIconName raw "$WATCH_APP/Info.plist" 2>/dev/null || echo MISSING)"

          # Replace CFBundleIconFiles entirely with a single "AppIcon" entry.
          # The old 5-entry array (AppIcon88, AppIcon100, etc.) references files
          # that don't exist — Apple's validator rejects that.
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIconFiles" "$WATCH_APP/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconFiles array" "$WATCH_APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconFiles:0 string AppIcon" "$WATCH_APP/Info.plist"
          echo "CFBundleIconFiles in Info.plist: $(plutil -extract CFBundleIconFiles raw "$WATCH_APP/Info.plist" 2>/dev/null || echo MISSING)"

      - name: Build and Sign Archive
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios

          # Get the provisioning profile path
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | head -1)
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          echo "Provisioning Profile UUID: $PROFILE_UUID"

          # Extract entitlements from provisioning profile
          ENTITLEMENTS_FILE=$RUNNER_TEMP/entitlements.plist
          security cms -D -i "$PROFILE_PATH" > $RUNNER_TEMP/profile.plist
          /usr/libexec/PlistBuddy -x -c 'Print :Entitlements' $RUNNER_TEMP/profile.plist > "$ENTITLEMENTS_FILE"
          echo "Entitlements extracted to: $ENTITLEMENTS_FILE"
          cat "$ENTITLEMENTS_FILE"

          # Build archive without codesign first.
          # Do NOT pass -sdk iphoneos — that would override every target's SDKROOT
          # including the watch target. Use -destination only so each target's
          # own SDKROOT is respected (Runner=iphoneos, Watch=watchos).
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            WATCHOS_DEPLOYMENT_TARGET=10.0 \
            2>&1 | tail -50

          echo "=== Archive created without signing ==="
          ls -la $RUNNER_TEMP/Runner.xcarchive/Products/Applications/ || true

          # Inject pre-built watch app into the archive before signing
          APP_PRODUCTS="$RUNNER_TEMP/Runner.xcarchive/Products/Applications"
          WATCH_APP_SRC=$(find $RUNNER_TEMP/watch_products -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$WATCH_APP_SRC" ]; then
            echo "Injecting watch app: $WATCH_APP_SRC"
            mkdir -p "$APP_PRODUCTS/Runner.app/Watch"
            cp -r "$WATCH_APP_SRC" "$APP_PRODUCTS/Runner.app/Watch/"
            echo "Watch app injected successfully"
            ls -la "$APP_PRODUCTS/Runner.app/Watch/"
          else
            echo "WARNING: Watch app not found — skipping watch injection"
          fi

          # Now sign the app manually
          APP_PATH="$RUNNER_TEMP/Runner.xcarchive/Products/Applications/Runner.app"

          # Sign all frameworks first (without entitlements)
          if [ -d "$APP_PATH/Frameworks" ]; then
            find "$APP_PATH/Frameworks" -name "*.framework" -type d | while read framework; do
              echo "Signing framework: $framework"
              codesign --force --sign "Apple Distribution" --keychain "$RUNNER_TEMP/build.keychain-db" "$framework" || true
            done
          fi

          # Sign watch app if embedded
          find "$APP_PATH/Watch" -name "*.app" -type d 2>/dev/null | while read watchapp; do
            echo "Signing watch app: $watchapp"
            # Sign watch app frameworks first
            find "$watchapp/Frameworks" -name "*.framework" -type d 2>/dev/null | while read fw; do
              codesign --force --sign "Apple Distribution" --keychain "$RUNNER_TEMP/build.keychain-db" "$fw" || true
            done

            # Extract entitlements from the watch provisioning profile.
            # This guarantees the application-identifier exactly matches what
            # the profile allows — hardcoding it caused a mismatch when the
            # profile bundle ID differed from what we expected.
            WATCH_ENTITLEMENTS=$RUNNER_TEMP/watch_entitlements.plist
            if [ -n "$WATCH_PROFILE_PATH" ] && [ -f "$WATCH_PROFILE_PATH" ]; then
              security cms -D -i "$WATCH_PROFILE_PATH" > $RUNNER_TEMP/watch_profile_decoded.plist
              /usr/libexec/PlistBuddy -x -c 'Print :Entitlements' \
                $RUNNER_TEMP/watch_profile_decoded.plist > "$WATCH_ENTITLEMENTS"
              echo "Watch entitlements extracted from profile:"
              cat "$WATCH_ENTITLEMENTS"
            else
              echo "ERROR: WATCH_PROFILE_PATH not set — cannot sign watch app"
              exit 1
            fi

            if [ -n "$WATCH_PROFILE_PATH" ] && [ -f "$WATCH_PROFILE_PATH" ]; then
              # Embed watch provisioning profile inside the watch app
              cp "$WATCH_PROFILE_PATH" "$watchapp/embedded.mobileprovision"
              codesign --force --sign "Apple Distribution" \
                --keychain "$RUNNER_TEMP/build.keychain-db" \
                --entitlements "$WATCH_ENTITLEMENTS" \
                "$watchapp"
              echo "Watch app signed with dedicated profile"
            else
              codesign --force --sign "Apple Distribution" \
                --keychain "$RUNNER_TEMP/build.keychain-db" \
                --entitlements "$WATCH_ENTITLEMENTS" \
                "$watchapp" || true
              echo "Watch app signed without dedicated profile (may fail App Store validation)"
            fi

            echo "Watch entitlements embedded in binary:"
            codesign -d --entitlements :- "$watchapp" 2>&1 || true
          done

          # Sign any app extensions
          find "$APP_PATH/PlugIns" -name "*.appex" -type d 2>/dev/null | while read ext; do
            echo "Signing extension: $ext"
            codesign --force --sign "Apple Distribution" \
              --keychain "$RUNNER_TEMP/build.keychain-db" \
              --entitlements "$ENTITLEMENTS_FILE" "$ext" || true
          done

          # Sign the main app with entitlements
          echo "Signing main app..."
          codesign --force --sign "Apple Distribution" \
            --keychain "$RUNNER_TEMP/build.keychain-db" \
            --entitlements "$ENTITLEMENTS_FILE" \
            "$APP_PATH"

          echo "Verifying signature..."
          codesign --verify --deep --verbose=2 "$APP_PATH" || true

          echo "Archive signed successfully"

      - name: Export IPA
        run: |
          cd ios

          # xcodebuild -exportArchive with method=app-store uses iOS signing rules and
          # rejects watchOS provisioning profiles, even by UUID. To avoid this, we:
          # 1. Temporarily remove the watch app from the archive before export
          # 2. Export the iOS-only IPA (succeeds cleanly)
          # 3. Unzip the IPA, inject the already-signed watch app, rezip
          # The watch app was signed with the watch profile in the signing step above.

          ARCHIVE_WATCH="$RUNNER_TEMP/Runner.xcarchive/Products/Applications/Runner.app/Watch"
          WATCH_BACKUP="$RUNNER_TEMP/watch_signed_backup"

          if [ -d "$ARCHIVE_WATCH" ]; then
            echo "Backing up signed watch app before export..."
            cp -r "$ARCHIVE_WATCH" "$WATCH_BACKUP"
            rm -rf "$ARCHIVE_WATCH"
          fi

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

          echo "IPA exported (iOS only)"
          ls -la $RUNNER_TEMP/export/

          # Re-inject signed watch app into the exported IPA
          IPA_PATH=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)
          if [ -n "$IPA_PATH" ] && [ -d "$WATCH_BACKUP" ]; then
            echo "Re-injecting signed watch app into IPA..."
            UNZIP_DIR="$RUNNER_TEMP/ipa_unzipped"
            mkdir -p "$UNZIP_DIR"
            unzip -q "$IPA_PATH" -d "$UNZIP_DIR"

            RUNNER_APP=$(find "$UNZIP_DIR/Payload" -name "Runner.app" -maxdepth 1 -type d | head -1)
            mkdir -p "$RUNNER_APP/Watch"
            cp -r "$WATCH_BACKUP"/. "$RUNNER_APP/Watch/"
            echo "Watch app files injected:"
            ls -la "$RUNNER_APP/Watch/"

            # Adding files to Runner.app invalidates its code signature.
            # Re-sign the watch bundle then re-sign Runner.app to restore a valid signature.

            # Extract Runner.app entitlements from its embedded provisioning profile
            RUNNER_ENT="$RUNNER_TEMP/runner_resign_entitlements.plist"
            PROV_PROFILE="$RUNNER_APP/embedded.mobileprovision"
            if [ -f "$PROV_PROFILE" ]; then
              security cms -D -i "$PROV_PROFILE" > "$RUNNER_TEMP/runner_prov_decoded.plist"
              /usr/libexec/PlistBuddy -x -c 'Print :Entitlements' "$RUNNER_TEMP/runner_prov_decoded.plist" > "$RUNNER_ENT"
              echo "Runner.app entitlements extracted for re-signing"
            else
              echo "WARNING: No embedded.mobileprovision — falling back to archive entitlements"
              cp "$RUNNER_TEMP/entitlements.plist" "$RUNNER_ENT"
            fi

            # Re-sign the watch app bundle(s) inside Runner.app/Watch/
            find "$RUNNER_APP/Watch" -name "*.app" -maxdepth 1 -type d | while read watchapp; do
              echo "Re-signing watch bundle in IPA: $watchapp"
              if [ -f "$RUNNER_TEMP/watch_entitlements.plist" ]; then
                codesign --force --sign "Apple Distribution" \
                  --keychain "$RUNNER_TEMP/build.keychain-db" \
                  --entitlements "$RUNNER_TEMP/watch_entitlements.plist" \
                  "$watchapp"
              else
                codesign --force --sign "Apple Distribution" \
                  --keychain "$RUNNER_TEMP/build.keychain-db" \
                  "$watchapp"
              fi
              echo "Watch bundle re-signed"
            done

            # Re-sign Runner.app itself (required — adding Watch/ files broke its signature)
            echo "Re-signing Runner.app after watch injection..."
            codesign --force --sign "Apple Distribution" \
              --keychain "$RUNNER_TEMP/build.keychain-db" \
              --entitlements "$RUNNER_ENT" \
              "$RUNNER_APP"

            echo "Verifying Runner.app signature..."
            codesign --verify --deep --verbose=2 "$RUNNER_APP" 2>&1 || true

            # Verify watch entitlements survived Runner.app re-signing
            echo "Watch bundle entitlements after Runner.app re-sign:"
            find "$RUNNER_APP/Watch" -name "*.app" -maxdepth 1 -type d | while read watchapp; do
              codesign -d --entitlements :- "$watchapp" 2>&1 || true
            done

            # Diagnostic: verify Info.plist is correct in the final IPA
            echo "=== DIAGNOSTIC: Watch Info.plist in final IPA ==="
            find "$RUNNER_APP/Watch" -name "*.app" -maxdepth 1 -type d | while read watchapp; do
              echo "Watch bundle: $watchapp"
              plutil -p "$watchapp/Info.plist" 2>&1 | grep -E "CFBundleIcon|CFBundleVersion|CFBundleShort" || true
              if [ -f "$watchapp/Assets.car" ]; then
                echo "Assets.car present: $(wc -c < "$watchapp/Assets.car") bytes"
              else
                echo "WARNING: Assets.car missing from watch bundle in IPA"
              fi
            done

            # Repackage IPA
            cd "$UNZIP_DIR"
            zip -qr "$IPA_PATH" Payload/
            echo "Watch app injected into IPA successfully"
          else
            echo "No watch backup found — IPA will not contain watch app"
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MajuRun-iOS-${{ github.run_number }}
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 14

      - name: Upload to App Store Connect
        if: success()
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          # Skip if secrets not configured
          if [ -z "$APP_STORE_CONNECT_KEY_ID" ]; then
            echo "App Store Connect credentials not configured. Skipping upload."
            echo "To enable auto-upload, add APP_STORE_CONNECT_KEY_ID, APP_STORE_CONNECT_ISSUER_ID, and APP_STORE_CONNECT_PRIVATE_KEY secrets."
            exit 0
          fi

          # Create API key file
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          # Find the IPA
          IPA_PATH=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)
          echo "Uploading IPA: $IPA_PATH"

          # Upload using xcrun altool (still supported in Xcode 26).
          # NOTE: altool exits 0 even on validation errors — must check the XML output
          # for product-errors to detect real failures.
          UPLOAD_LOG="$RUNNER_TEMP/altool_output.xml"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --output-format xml | tee "$UPLOAD_LOG"

          if grep -q "product-errors" "$UPLOAD_LOG"; then
            echo "❌ Upload rejected by App Store Connect — see errors above"
            exit 1
          fi

          echo "✅ Successfully uploaded to App Store Connect!"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain-db || true
